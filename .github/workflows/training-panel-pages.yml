name: Training Panel Remote Web

on:
  push:
    branches: [main]
    paths:
      - "tools/training_panel/remote_web/**"
      - ".github/workflows/training-panel-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: training-panel-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: tools/training_panel/remote_web
      - id: deployment
        uses: actions/deploy-pages@v4
