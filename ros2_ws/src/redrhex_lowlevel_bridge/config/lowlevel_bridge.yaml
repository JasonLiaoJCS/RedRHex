redrhex_lowlevel_bridge:
  ros__parameters:
    backend: "mock"  # mock or serial
    feedback_rate_hz: 50.0
    mock:
      print_every_n: 50
    serial:
      port: "/dev/ttyUSB0"
      baudrate: 921600
      timeout_s: 0.005
      # Keep false while the MCU packet format is provisional. Set true only
      # after the low-level board has its own watchdog, CRC validation, and E-stop path.
      allow_enable: false
